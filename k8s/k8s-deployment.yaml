---
apiVersion: v1
kind: Namespace
metadata:
  name: maximuslabog
  labels:
    app: maximuslabog-web

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: maximuslabog-web
  namespace: maximuslabog
  labels:
    app: maximuslabog-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: maximuslabog-web
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: maximuslabog-web
    spec:
      containers:
        - name: maximuslabog-web
          image: 192.168.2.128:8082/maximuslabog-web:v1
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: maximuslabog-web
  namespace: maximuslabog
spec:
  selector:
    app: maximuslabog-web
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: maximuslabog-web
  namespace: maximuslabog
spec:
  ingressClassName: nginx
  rules:
    - host: maximuslabog.lab.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: maximuslabog-web
                port:
                  number: 80